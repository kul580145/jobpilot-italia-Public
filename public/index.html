<!DOCTYPE html>
<html>
<head>
  <title>JobPilot Italia Login</title>
</head>
<body>

  <h2>Login System</h2>

  <!-- Google Login -->
  <button onclick="googleLogin()">Login with Google</button>

  <br><br>

  <!-- Phone Login -->
  <input type="text" id="phone" placeholder="+39XXXXXXXXXX">
  <div id="recaptcha-container"></div>
  <button onclick="sendOTP()">Send OTP</button>

  <br><br>

  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify OTP</button>

  <br><br>

  <button onclick="logout()">Logout</button>

  <p id="user"></p>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, 
      GoogleAuthProvider, 
      signInWithPopup,
      RecaptchaVerifier,
      signInWithPhoneNumber,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_NEW_API_KEY",
      authDomain: "jobpilot-italia.firebaseapp.com",
      projectId: "jobpilot-italia",
      storageBucket: "jobpilot-italia.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Google Login
    window.googleLogin = function() {
      signInWithPopup(auth, provider)
        .then((result) => {
          document.getElementById("user").innerText =
            "Logged in: " + result.user.email;
        })
        .catch((error) => alert(error.message));
    };

    // Setup reCAPTCHA
    window.recaptchaVerifier = new RecaptchaVerifier(
      auth,
      "recaptcha-container",
      {
        size: "normal",
      }
    );

    let confirmationResult;

    // Send OTP
    window.sendOTP = function() {
      const phoneNumber = document.getElementById("phone").value;

      signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
        .then((result) => {
          confirmationResult = result;
          alert("OTP Sent!");
        })
        .catch((error) => alert(error.message));
    };

    // Verify OTP
    window.verifyOTP = function() {
      const code = document.getElementById("otp").value;

      confirmationResult.confirm(code)
        .then((result) => {
          document.getElementById("user").innerText =
            "Logged in: " + result.user.phoneNumber;
        })
        .catch((error) => alert("Wrong OTP"));
    };

    // Logout
    window.logout = function() {
      signOut(auth).then(() => {
        document.getElementById("user").innerText = "Logged out";
      });
    };

    // Auto detect user
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("user").innerText =
          "Already logged in: " + (user.email || user.phoneNumber);
      }
    });

  </script>

</body>
</html>
